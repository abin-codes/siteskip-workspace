spring.application.name=api

# Server Config
server.port=8080

# H2 Database Config (In-Memory for persistent domain learning during runtime)
spring.datasource.url=jdbc:h2:mem:siteskipdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# Spring AI Google GenAI Configuration
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-3.1-flash-lite
spring.ai.google.genai.chat.options.temperature=0.2

# CORS Allowed Extension ID
cors.allowed.extension.id=${EXTENSION_ID}